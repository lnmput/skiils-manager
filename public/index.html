<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Skills Manager</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="masthead">
        <div>
          <p class="eyebrow" data-i18n="eyebrow">Local Codex</p>
          <h1>Skills Manager</h1>
        </div>
        <div class="headerActions">
          <div class="languageSwitch" aria-label="Language">
            <button class="languageButton active" data-lang="en" type="button">English</button>
            <button class="languageButton" data-lang="zh" type="button">中文</button>
          </div>
          <div class="stats" aria-live="polite">
            <span><strong id="enabledCount">0</strong> <span id="enabledLabel">enabled</span></span>
            <span><strong id="disabledCount">0</strong> <span id="disabledLabel">disabled</span></span>
          </div>
        </div>
      </header>

      <section class="toolbar" aria-label="Skill filters" data-i18n-aria="skillFilters">
        <div class="searchWrap">
          <span aria-hidden="true">⌕</span>
          <input id="search" type="search" placeholder="Search skills or functions" autocomplete="off">
        </div>
        <div class="segments">
          <button class="segment active" data-filter="all" type="button"></button>
          <button class="segment" data-filter="enabled" type="button"></button>
          <button class="segment" data-filter="disabled" type="button"></button>
        </div>
      </section>

      <nav class="sourceTabs" id="sourceTabs" aria-label="Skill source groups" data-i18n-aria="sourceGroups"></nav>

      <nav class="categoryTabs" id="categoryTabs" aria-label="Skill categories" data-i18n-aria="skillCategories"></nav>

      <section class="bulkBar" aria-label="Bulk skill actions" data-i18n-aria="bulkActions">
        <div>
          <strong id="scopeLabel">All skills</strong>
          <span id="scopeMeta">0 visible</span>
        </div>
        <div class="bulkActions">
          <button class="bulkButton enable" id="bulkEnable" type="button">Enable visible</button>
          <button class="bulkButton" id="bulkDisable" type="button">Disable visible</button>
        </div>
      </section>

      <section class="table" aria-label="Skills" data-i18n-aria="skills">
        <div class="row head">
          <span data-i18n="tableSkill">Skill</span>
          <span data-i18n="tableFunction">Function</span>
          <span data-i18n="tableSource">Source</span>
          <span data-i18n="tableStatus">Status</span>
          <span data-i18n="tableAction">Action</span>
        </div>
        <div id="skills"></div>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="/app.js"></script>
  </body>
</html>
